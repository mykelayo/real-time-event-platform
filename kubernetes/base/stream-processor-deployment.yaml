apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-processor
  namespace: real-time-platform
  labels:
    app: stream-processor
    component: processor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stream-processor
  template:
    metadata:
      labels:
        app: stream-processor
        component: processor
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
      - name: stream-processor
        image: stream-processor:latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: app-config
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          exec:
            command: ["pgrep", "-f", "src.main"]
          initialDelaySeconds: 15
          periodSeconds: 30
          failureThreshold: 3